name: Composer install

on:
  push:

jobs:
  composer-install:
    name: Composer install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: latest
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4
